name: Process Second Brain

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run tests
        run: node --test scripts/process.test.mjs

      - name: Check for new files in /raw
        id: check
        run: |
          COUNT=$(find ./raw -maxdepth 1 -name "*.md" | wc -l)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Arquivos em /raw: $COUNT"

      - name: Process files
        if: steps.check.outputs.count > 0
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node scripts/process.mjs

      - name: Commit and push
        if: steps.check.outputs.count > 0
        run: |
          git config user.name "second-brain[bot]"
          git config user.email "second-brain[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "brain: processamento automático $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
